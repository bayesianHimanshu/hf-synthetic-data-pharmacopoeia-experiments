project:
  name: "pharma-slm"
  version: "0.1.0"              
  hf_username: "EulerianKnight"
  hf_token_env: "HUGGINGFACE_API_KEY"

data:
  pdf_url: "https://qps.nhsrcindia.org/sites/default/files/2022-01/INDIAN%20PHARMACOPOEIA%202010%20Volume%201.pdf"
  pdf_filename: "outputs/data/IP_2010_Vol1.pdf"
  raw_chunks_path: "outputs/data/pharmacopeia_raw_chunks.jsonl"
  chunk_size: 3000
  min_chunk_len: 100
  raw_hub_repo: "EulerianKnight/pharmacopeia-raw-chunks"
  figure_extraction:
    enabled: true                 # set to true to run the two-pass vision pipeline
    vision_model: "HuggingFaceTB/SmolVLM-Instruct"
    dpi: 150                       
    min_drawing_area: 5000.0       
    max_new_tokens: 256
    batch_size: 4                  

synthesis:
  model_name: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
  max_model_len: 8192
  tensor_parallel_size: 1         
  temperature: 0.0
  max_tokens: 2048
  stop_tokens: ["<|im_end|>"]
  output_path: "outputs/data/synthetic_pharmacopeia_tables.jsonl"
  synthetic_hub_repo: "EulerianKnight/pharmacopeia-synthetic-instruct"
  min_output_len: 10

training:
  base_model_id: "google/gemma-2b-it"
  dataset_id: "EulerianKnight/pharmacopeia-synthetic-instruct"
  output_dir: "outputs/checkpoints/gemma-pharmacopeia-slm"
  adapter_subdir: "final_adapter"
  max_length: 2048
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  optim: "paged_adamw_8bit"
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  num_train_epochs: 8
  eval_split: 0.1        # hold out 10% for eval
  eval_steps: 50         # evaluate every 50 steps
  save_strategy: "steps"
  save_steps: 50
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  logging_steps: 10
  bf16: true
  fp16: false
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    bias: "none"
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  quantization:
    load_in_4bit: true
    quant_type: "nf4"
    compute_dtype: "bfloat16"
    double_quant: true

merge:
  base_model_id: "google/gemma-2b-it"
  adapter_dir: "outputs/checkpoints/gemma-pharmacopeia-slm/final_adapter"
  merged_hub_repo: "EulerianKnight/gemma-2b-pharmacopeia-slm"
  torch_dtype: "bfloat16"

inference:
  model_id: "EulerianKnight/gemma-2b-pharmacopeia-slm"
  max_new_tokens: 512
  temperature: 0.1
  do_sample: true

wandb:
  enabled: true
  project: "pharma-slm"
  run_name: null
  tags: []

bayesian:
  entropy_threshold: 1.0          
  skip_tokens: ["", "|", "-", " ", "\n"]

outputs:
  plots_dir: "outputs/plots"
  csv_path: "outputs/plots/metrics.csv"

telemetry:
  service_name: "pharma-slm"
  exporters:
    - type: "console"
    - type: "file"
      path: "outputs/otel_traces.jsonl"
